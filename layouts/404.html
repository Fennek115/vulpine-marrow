{{ define "main" }}
<article class="post post--single">
  <h1 class="post-title">{{ $.Site.Params.missingContentMessage | default "Page not found..." }}</h1>

  <hr>

  <div class="post-content">
    <p><a href="{{ .Site.Home.RelPermalink }}">{{ $.Site.Params.missingBackButtonLabel | default "Back to home page" }}</a></p>
  </div>

  <script>
    // Otorga 5 segundos para leer el mensaje antes de volver al inicio
    setTimeout(function() {
      window.location.href = "{{ .Site.Home.RelPermalink }}";
    }, 5000);
  </script>
</article>
{{ end }}
